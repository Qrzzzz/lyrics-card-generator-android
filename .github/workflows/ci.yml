name: Android Alpha CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: renderer/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android 16 QPR2 SDK
        shell: pwsh
        run: sdkmanager "platforms;android-36.1" "build-tools;36.1.0"

      - name: Verify renderer
        working-directory: renderer
        run: npm ci && npm run check

      - name: Test and build Alpha APK
        shell: pwsh
        run: .\gradlew.bat :app:testAlphaDebugUnitTest :app:assembleAlphaDebug

      - uses: actions/upload-artifact@v4
        with:
          name: lyrics-card-android-alpha
          path: app/build/outputs/apk/alpha/debug/*.apk

